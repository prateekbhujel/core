name: Deploy Core To cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-core-cpanel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          CORE_DEPLOY_PATH: ${{ secrets.CORE_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          [ -n "${CPANEL_USER:-}" ] || { echo "Missing secret: CPANEL_USER"; exit 1; }
          [ -n "${CPANEL_SSH_PRIVATE_KEY:-}" ] || { echo "Missing secret: CPANEL_SSH_PRIVATE_KEY"; exit 1; }
          [ -n "${CORE_DEPLOY_PATH:-}" ] || { echo "Missing secret: CORE_DEPLOY_PATH"; exit 1; }

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add cPanel host to known_hosts
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
        run: |
          set -euo pipefail
          HOST="${CPANEL_HOST:-cpanel.pratikbhujel.com.np}"
          PORT="${CPANEL_SSH_PORT:-1980}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Sync code to shared hosting
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          CORE_DEPLOY_PATH: ${{ secrets.CORE_DEPLOY_PATH }}
          CORE_DEPLOY_DELETE: ${{ secrets.CORE_DEPLOY_DELETE }}
        run: |
          set -euo pipefail
          HOST="${CPANEL_HOST:-cpanel.pratikbhujel.com.np}"
          PORT="${CPANEL_SSH_PORT:-1980}"
          if [ "${CORE_DEPLOY_DELETE:-0}" = "1" ]; then
            echo "CORE_DEPLOY_DELETE=1 requested; tar-based deploy mode does not support delete sync on shared hosting."
          fi

          ssh -p "$PORT" "${CPANEL_USER}@${HOST}" "mkdir -p '${CORE_DEPLOY_PATH}'"

          tar -czf - \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".env" \
            --exclude="node_modules" \
            --exclude="vendor" \
            --exclude="storage" \
            --exclude="public/uploads" \
            . | ssh -p "$PORT" "${CPANEL_USER}@${HOST}" "tar -xzf - -C '${CORE_DEPLOY_PATH}'"

      - name: Run post-deploy commands
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          CORE_DEPLOY_PATH: ${{ secrets.CORE_DEPLOY_PATH }}
          CORE_RUN_MIGRATIONS: ${{ secrets.CORE_RUN_MIGRATIONS }}
        run: |
          set -euo pipefail
          HOST="${CPANEL_HOST:-cpanel.pratikbhujel.com.np}"
          PORT="${CPANEL_SSH_PORT:-1980}"

          ssh -p "$PORT" "${CPANEL_USER}@${HOST}" \
            "APP_PATH='${CORE_DEPLOY_PATH}' RUN_MIGRATIONS='${CORE_RUN_MIGRATIONS:-0}' bash -s" <<'EOSSH'
          set -euo pipefail
          cd "$APP_PATH"

          if command -v composer >/dev/null 2>&1; then
            composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
          else
            echo "composer not found on server, skipping composer install."
          fi

          if [ -f artisan ]; then
            php artisan view:clear || true
            php artisan optimize:clear || true
            if [ "${RUN_MIGRATIONS:-0}" = "1" ]; then
              php artisan migrate --force || true
            fi
            php artisan optimize || true
          fi

          chmod -R ug+rw bootstrap/cache storage || true
          EOSSH
